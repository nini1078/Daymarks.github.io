<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Daymark — Скоро вернёмся</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

:root{
--bg:#09080F;
--text:#fff;
--sub:rgba(255,255,255,.58);
--card:rgba(255,255,255,.05);
--border:rgba(255,255,255,.08);
--purple:#7C3AED;
--purple2:#B794FF;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,
body{

width:100%;
height:100%;

overflow:hidden;
overscroll-behavior:none;

touch-action:none;

}

body{

font-family:"Inter",sans-serif;

background:var(--bg);

display:flex;
justify-content:center;
align-items:center;

position:relative;

color:var(--text);

}

/* сетка */

body::before{

content:"";

position:absolute;
inset:0;

background-image:
radial-gradient(rgba(255,255,255,.05) 1px,transparent 1px);

background-size:34px 34px;

}

/* фоновые орбы */

.orb{

position:absolute;

border-radius:50%;

filter:blur(90px);

animation:float 18s ease-in-out infinite;

}

.orb1{

width:520px;
height:520px;

left:-180px;
top:-180px;

background:
radial-gradient(circle,#6D28D9 0%,transparent 70%);

}

.orb2{

width:430px;
height:430px;

right:-120px;
bottom:-120px;

animation-duration:22s;

background:
radial-gradient(circle,#2563EB 0%,transparent 70%);

}

.orb3{

width:260px;
height:260px;

left:60%;
top:35%;

animation-duration:16s;

background:
radial-gradient(circle,#A855F7 0%,transparent 70%);

}

@keyframes float{

0%,100%{

transform:
translate(0,0)
scale(1);

}

50%{

transform:
translate(35px,-30px)
scale(1.08);

}

}

/* карточка */

.card{

position:relative;

z-index:2;

width:min(520px,calc(100% - 30px));

padding:58px 42px;

text-align:center;

border-radius:34px;

background:rgba(255,255,255,.045);

border:1px solid rgba(255,255,255,.08);

backdrop-filter:blur(34px);

-webkit-backdrop-filter:blur(34px);

box-shadow:

0 30px 90px rgba(0,0,0,.55),

inset 0 1px 0 rgba(255,255,255,.08);

animation:

fade .8s cubic-bezier(.22,1,.36,1),

breathe 6s ease-in-out infinite;

}

@keyframes fade{

from{

opacity:0;

transform:
translateY(25px);

}

to{

opacity:1;

transform:none;

}

}

@keyframes breathe{

0%,100%{

transform:scale(1);

}

50%{

transform:scale(1.012);

}

}

.logo{

font-size:42px;

font-weight:900;

letter-spacing:-1.5px;

background:

linear-gradient(
135deg,
#F3E8FF,
#B794FF,
#7C3AED
);

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

margin-bottom:8px;

}

.subtitle{

font-size:12px;

letter-spacing:4px;

text-transform:uppercase;

font-weight:700;

color:rgba(183,148,255,.8);

margin-bottom:28px;

}

.line{

width:56px;

height:2px;

margin:0 auto 30px;

border-radius:99px;

background:
linear-gradient(
90deg,
transparent,
#B794FF,
transparent
);

}

.title{

font-size:26px;

font-weight:800;

margin-bottom:16px;

}

.desc{

font-size:15px;

line-height:1.8;

color:var(--sub);

max-width:360px;

margin:auto;

}

.tags{

display:flex;

justify-content:center;

flex-wrap:wrap;

gap:10px;

margin-top:34px;

}

.tag{

padding:8px 15px;

border-radius:999px;

background:rgba(255,255,255,.05);

border:1px solid rgba(255,255,255,.08);

font-size:12px;

font-weight:600;

}

.active{

background:rgba(124,58,237,.18);

color:#DDD6FE;

border-color:rgba(124,58,237,.35);

}

.footer{

margin-top:38px;

font-size:12px;

color:rgba(255,255,255,.3);

}

</style>
</head>

<body><div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="card">

    <div class="logo">Daymark</div>

    <div class="subtitle">
        Mood Diary
    </div>

    <div class="line"></div>

    <div class="title">
        Скоро вернёмся
    </div>

    <p class="desc">
        Мы готовим большое обновление Daymark.
        <br><br>
        Совсем скоро приложение снова станет
        доступно с новым дизайном,
        улучшенной производительностью
        и приятными изменениями.
        <br><br>
        <strong>Спасибо за терпение ✦</strong>
    </p>

    <div class="tags">

        <span class="tag active">
            Новый дизайн
        </span>

        <span class="tag active">
            Исправление багов
        </span>

        <span class="tag">
            Новые функции
        </span>

        <span class="tag">
            Оптимизация
        </span>

    </div>

    <div class="footer">
        Скоро увидимся
    </div>

</div></body>
</html>
